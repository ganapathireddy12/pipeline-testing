<div class="footer" style="display: flex; gap: 20px; justify-content: center">
  <button class="btn-glow" onclick="openUpdates()">PREVIOUS UPDATES</button>
  <button class="btn-outline">RE-RUN PIPELINE</button>
</div>

<div id="updatesModal" class="modal-overlay">
  <div class="modal-content glass">
    <div class="modal-header">
      <h3><i class="fas fa-history"></i> Build History</h3>
      <button class="close-btn" onclick="closeUpdates()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="update-item">
        <div class="update-marker success"></div>
        <div class="update-text">
          <strong>v2.1.0 - UI Enhancement</strong>
          <p>Added glassmorphism and neon animations.</p>
          <span class="date">May 09, 14:20</span>
        </div>
      </div>
      <div class="update-item">
        <div class="update-marker success"></div>
        <div class="update-text">
          <strong>v2.0.4 - Docker Push</strong>
          <p>Image optimized and pushed to registry.</p>
          <span class="date">May 08, 11:45</span>
        </div>
      </div>
      <div class="update-item">
        <div class="update-marker error"></div>
        <div class="update-text">
          <strong>v2.0.3 - Bug Fix</strong>
          <p>Fixed Java 21 compatibility issues.</p>
          <span class="date">May 07, 09:10</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function openUpdates() {
    document.getElementById("updatesModal").classList.add("active");
  }
  function closeUpdates() {
    document.getElementById("updatesModal").classList.remove("active");
  }
</script>
