<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ganapathi | Black Hole Mode</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="black-hole-bg"></div>
    <div class="ring"></div>

    <div class="dashboard">
      <div class="header">
        <h1 class="branding-name">GANAPATHI</h1>
        <p
          style="
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.6rem;
            letter-spacing: 8px;
            margin-top: 20px;
          "
        >
          VOID ARCHITECTURE // ZERO GRAVITY CI/CD
        </p>
      </div>

      <div class="pipeline-status">
        <div class="node active">
          <i class="fas fa-atom"></i>
        </div>
        <div class="node active">
          <i class="fas fa-dna"></i>
        </div>
        <div class="node active">
          <i class="fas fa-microchip"></i>
        </div>
        <div class="node">
          <i class="fas fa-infinity"></i>
        </div>
      </div>

      <div class="terminal-void">
        <p id="voidLog">Pulling artifact into event horizon...</p>
      </div>

      <div class="footer" style="margin-top: 50px">
        <button class="btn-singularity" onclick="spaghettify()">
          COLLAPSE DATA
        </button>
      </div>
    </div>

    <script>
      function spaghettify() {
        const node = document.querySelector(".terminal-void p");
        node.innerText = "DATA COMPRESSED TO INFINITE DENSITY.";
        node.style.color = "white";
        node.style.textShadow = "0 0 20px white";
      }
    </script>
  </body>
</html>
