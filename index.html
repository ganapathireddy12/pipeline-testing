<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevOps Pro CI/CD Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="branding-bar">
      <span class="logo-circle"><i class="fas fa-satellite-dish"></i></span>
      <span class="logo-text"
        >GANAPATHI <span class="ops-tag">| DevOps</span></span
      >
    </div>

    <div class="container glass">
      <header class="pipeline-header">
        <div class="status-indicator">
          <span class="dot pulse-green"></span>
          <span class="status-text">PIPELINE ACTIVE</span>
        </div>
        <h1>CI/CD Automation Suite</h1>
        <p>Live Monitoring and Execution View</p>
      </header>

      <div class="pipeline-visualization">
        <div class="pipe-lane code-lane active">
          <div class="lane-icon"><i class="fas fa-code"></i></div>
          <div class="lane-info">
            <h4>Source</h4>
            <p>Code Commit</p>
          </div>
        </div>

        <div class="connector-line pulse-arrow">
          <i class="fas fa-arrow-right"></i>
        </div>

        <div class="pipe-lane build-lane running">
          <div class="lane-icon"><i class="fas fa-box-open"></i></div>
          <div class="lane-info">
            <h4>Build</h4>
            <p>Docker Image</p>
          </div>
        </div>

        <div class="connector-line pulse-arrow">
          <i class="fas fa-arrow-right"></i>
        </div>

        <div class="pipe-lane test-lane pending">
          <div class="lane-icon"><i class="fas fa-vial"></i></div>
          <div class="lane-info">
            <h4>Test</h4>
            <p>QA Suites</p>
          </div>
        </div>

        <div class="connector-line pulse-arrow">
          <i class="fas fa-arrow-right"></i>
        </div>

        <div class="pipe-lane deploy-lane success-bounce">
          <div class="lane-icon"><i class="fas fa-cloud-upload-alt"></i></div>
          <div class="lane-info">
            <h4>Deploy</h4>
            <p>K8s Cluster</p>
          </div>
        </div>
      </div>

      <button class="status-btn">
        <i class="fas fa-shield-alt"></i> Production Status: Verified
      </button>
    </div>
  </body>
</html>
